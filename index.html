<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serial Console</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 30px;
      background-color: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    h2 {
      color: #a0cfff;
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 1.2em;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #2a3a5a;
      padding-bottom: 8px;
    }

    .main-layout-container {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      align-items: flex-start;
    }

    /* Left column: fixed width (smaller) */
    .left-column {
      flex: 0 0 200px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Right column: fills remaining space (larger) */
    .right-column {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .panel {
      background: #16213e;
      border: 1px solid #2a3a5a;
      border-radius: 8px;
      padding: 15px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      margin-bottom: 12px;
    }

    label {
      font-size: 12px;
      color: #a0b0c8;
      text-align: left;
      margin-bottom: 4px;
    }

    select {
      flex: 1;
      padding: 5px 8px;
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #2a4a7a;
      border-radius: 4px;
      font-size: 13px;
    }

    select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #0f3460;
      color: #a0cfff;
      border: 1px solid #2a5a9a;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) {
      background-color: #1a4a7a;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #connectButton {
      width: 100%;
      margin-top: 6px;
      background-color: #0f5a30;
      border-color: #1a8a50;
      color: #80ffb0;
      font-weight: bold;
    }

    #connectButton:hover:not(:disabled) {
      background-color: #1a7a40;
    }
   
    #connectButton.disconnect {
      background-color: #5a0f0f;
      border-color: #8a1a1a;
      color: #ffb0b0;
    }
#connectButton.disconnect:hover:not(:disabled) { background-color: #7a1a1a; }
    /* Console Output */
    #uartOutput {
      background-color: #000;
      color: #2aee2a;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      width: 100%;
      height: 700px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #1a3a1a;
      resize: vertical;
      overflow-y: auto;
      display: block;
    }

    #uartOutput:focus {
      outline: none;
      border-color: #2aee2a;
      box-shadow: 0 0 0 2px rgba(42,238,42,0.25);
    }

    /* Output action buttons */
    .output-actions {
      display: flex;
      gap: 10px;
    }

    #saveButton {
      background-color: #1a4a1a;
      border-color: #2a7a2a;
      color: #80ff80;
    }

    #clearButton {
      background-color: #4a1a1a;
      border-color: #7a2a2a;
      color: #ff8080;
    }

    /* Command History */
    #historyList {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      max-height: 120px;
      overflow-y: auto;
    }

    .history-tag {
      background: #0a2a0a;
      border: 1px solid #1a5a1a;
      color: #60cc60;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 5px;
      max-width: 220px;
    }

    .history-tag:hover {
      background: #1a4a1a;
      border-color: #2aee2a;
      color: #2aee2a;
    }

    .history-tag span.cmd-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-tag .del-btn {
      color: #5a5a5a;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      cursor: pointer;
    }

    .history-tag .del-btn:hover {
      color: #ff6060;
    }

    .history-empty {
      font-size: 12px;
      color: #2a4a2a;
      font-style: italic;
    }

    .section-label {
      font-size: 11px;
      color: #4a7a6a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      margin-top: 2px;
    }

    #clearHistoryBtn {
      font-size: 11px;
      padding: 3px 10px;
      background: transparent;
      border-color: #2a3a4a;
      color: #4a6a8a;
      margin-left: auto;
    }
  </style>
</head>
<body>

<div class="main-layout-container">

  <!-- Left: Port Settings -->
  <div class="left-column">
    <div class="panel">
      <h2>Port Settings</h2>

      <div class="input-group">
        <label for="baudRateSelect">Baud Rate</label>
        <select id="baudRateSelect">
          <option value="300">300</option>
          <option value="600">600</option>
          <option value="1200">1200</option>
          <option value="2400">2400</option>
          <option value="4800">4800</option>
          <option value="9600">9600</option>
          <option value="14400">14400</option>
          <option value="19200">19200</option>
          <option value="38400">38400</option>
          <option value="57600">57600</option>
          <option value="115200" selected>115200</option>
          <option value="230400">230400</option>
          <option value="460800">460800</option>
          <option value="921600">921600</option>
          <option value="1000000">1000000</option>
          <option value="1500000">1500000</option>
          <option value="2000000">2000000</option>
        </select>
      </div>

      <div class="input-group">
        <label for="dataBitsSelect">Data Bits</label>
        <select id="dataBitsSelect">
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8" selected>8</option>
        </select>
      </div>

      <div class="input-group">
        <label for="stopBitsSelect">Stop Bits</label>
        <select id="stopBitsSelect">
          <option value="1" selected>1</option>
          <option value="2">2</option>
        </select>
      </div>

      <div class="input-group">
        <label for="paritySelect">Parity</label>
        <select id="paritySelect">
          <option value="none" selected>None</option>
          <option value="even">Even</option>
          <option value="odd">Odd</option>
          <option value="mark">Mark</option>
          <option value="space">Space</option>
        </select>
      </div>

      <button id="connectButton">⚡ Connect</button>
    </div>
  </div>

  <!-- Right: Console -->
  <div class="right-column">

    <!-- Console -->
    <div class="panel">
      <h2>Console</h2>
      <textarea id="uartOutput" readonly placeholder="⚡ Connection offline. Choose settings and click Connect to start. Once connected, type directly in this window to send data (like minicom)."></textarea>
      <div class="output-actions" style="margin-top: 10px;">
        <button id="saveButton">💾 Save Output</button>
        <button id="clearButton">🗑 Clear Output</button>
      </div>

      <!-- Command History -->
      <div style="display:flex; align-items:center; margin-top: 18px; border-top: 1px solid #2a3a5a; padding-top: 12px;">
        <div class="section-label" style="margin:0;">Command History</div>
        <button id="clearHistoryBtn">Clear all</button>
      </div>
      <div id="historyList">
        <span class="history-empty">No commands sent yet.</span>
      </div>
    </div>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  let port, writer, reader;
  let isConnected = false;
  const HISTORY_KEY = 'serial_cmd_history';
  const MAX_HISTORY = 30;

  const ta = document.getElementById('uartOutput');

  let inputBuffer = '';
  let historyIndex = -1;
  let tempInput = '';

  const CURSOR_CHAR = '▊';
  let cursorVisible = false;
  let isFocused = false;
  let blinkTimer = null;

  function getBaseText() {
    let val = ta.value;
    if (val.endsWith(CURSOR_CHAR)) {
      val = val.slice(0, -CURSOR_CHAR.length);
    }
    return val;
  }

  function setTerminalText(text) {
    const scrollTop = ta.scrollTop;
    if (isFocused && isConnected) {
      ta.value = text + (cursorVisible ? CURSOR_CHAR : '');
    } else {
      ta.value = text;
    }
    ta.scrollTop = scrollTop;
  }

  function startCursorBlink() {
    if (blinkTimer) clearInterval(blinkTimer);
    cursorVisible = true;
    setTerminalText(getBaseText());
    
    blinkTimer = setInterval(() => {
      if (!isConnected) {
        stopCursorBlink();
        return;
      }
      cursorVisible = !cursorVisible;
      setTerminalText(getBaseText());
    }, 500);
  }

  function stopCursorBlink() {
    if (blinkTimer) {
      clearInterval(blinkTimer);
      blinkTimer = null;
    }
    cursorVisible = false;
    setTerminalText(getBaseText());
  }

  // ── History helpers ──
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveHistory(arr) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
  }

  function addToHistory(cmd) {
    let h = loadHistory();
    h = h.filter(c => c !== cmd);
    h.unshift(cmd);
    if (h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
    saveHistory(h);
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const h = loadHistory();
    if (h.length === 0) {
      list.innerHTML = '<span class="history-empty">No commands sent yet.</span>';
      return;
    }
    list.innerHTML = h.map((cmd, i) => `
      <div class="history-tag" data-index="${i}">
        <span class="cmd-text" title="${escapeHtml(cmd)}">${escapeHtml(cmd)}</span>
        <span class="del-btn" data-del="${i}" title="Remove">×</span>
      </div>
    `).join('');

    list.querySelectorAll('.history-tag').forEach(tag => {
      tag.addEventListener('click', async (e) => {
        if (e.target.classList.contains('del-btn')) return;
        if (!isConnected || !writer) return;
        const idx = parseInt(tag.dataset.index);
        const cmd = loadHistory()[idx];
        
        if (inputBuffer.length > 0) {
          await sendRawData('\x08'.repeat(inputBuffer.length));
          inputBuffer = '';
        }
        
        inputBuffer = cmd;
        await sendRawData(inputBuffer);
        ta.focus();
      });
    });

    list.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.del);
        const h = loadHistory();
        h.splice(idx, 1);
        saveHistory(h);
        renderHistory();
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Connect ──
  async function connectToSerialPort() {
    try {
      const baudRate = parseInt(document.getElementById('baudRateSelect').value, 10);
      const dataBits = parseInt(document.getElementById('dataBitsSelect').value, 10);
      const stopBits = parseInt(document.getElementById('stopBitsSelect').value, 10);
      const parity   = document.getElementById('paritySelect').value;

      port = await navigator.serial.requestPort({ filters: [] });
      await port.open({ baudRate, dataBits, stopBits, parity });
      writer = port.writable.getWriter();
      ansiBuffer = '';

      isConnected = true;
      const btn = document.getElementById('connectButton');
      btn.textContent = '✕ Disconnect';
      btn.classList.add('disconnect');
      document.getElementById('baudRateSelect').disabled = true;
      document.getElementById('dataBitsSelect').disabled = true;
      document.getElementById('stopBitsSelect').disabled = true;
      document.getElementById('paritySelect').disabled   = true;

      ta.placeholder = "⚡ Connected. Type directly in this window to send data to the serial port...";
      ta.focus();

      reader = port.readable.getReader();
      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          if (value) displayUartOutput(new TextDecoder('utf-8').decode(value));
        }
      } finally {
        reader.releaseLock();
        reader = null;
      }
      if (isConnected) await doDisconnect();

    } catch (err) {
      if (err.name !== 'NotFoundError' && err.name !== 'AbortError') {
        console.error('Serial connect error:', err);
      }
      await doDisconnect();
    }
  }

  async function doDisconnect() {
    isConnected = false;
    const btn = document.getElementById('connectButton');
    btn.textContent = '⚡ Connect';
    btn.classList.remove('disconnect');
    document.getElementById('baudRateSelect').disabled = false;
    document.getElementById('dataBitsSelect').disabled = false;
    document.getElementById('stopBitsSelect').disabled = false;
    document.getElementById('paritySelect').disabled   = false;

    ta.placeholder = "⚡ Connection offline. Choose settings and click Connect to start. Once connected, type directly in this window to send data (like minicom).";
    
    inputBuffer = '';
    historyIndex = -1;
    stopCursorBlink();

    try { if (writer) { writer.releaseLock(); writer = null; } } catch {}
    try { if (reader) { await reader.cancel(); reader = null; } } catch {}
    try { if (port)   { await port.close();   port   = null; } } catch {}
  }

  async function sendRawData(data) {
    if (!writer || writer.locked) return;
    try {
      await writer.write(new TextEncoder().encode(data));
    } catch (err) {
      console.error('Send error:', err);
    }
  }

  let ansiBuffer = '';

  function stripAnsi(chunk) {
    const str = ansiBuffer + chunk;
    ansiBuffer = '';
    let result = '';
    let i = 0;

    while (i < str.length) {
      if (str[i] === '\x1b') {
        const rest = str.slice(i);
        const csi = rest.match(/^\x1b\[[0-9;]*[a-zA-Z]/);
        const osc = rest.match(/^\x1b\][^\x07\x1b]*(\x07|\x1b\\)/);
        const match = csi || osc;
        if (match) {
          i += match[0].length;
          continue;
        }
        if (rest.length < 24) {
          ansiBuffer = rest;
          break;
        } else {
          i += 1;
        }
      } else {
        result += str[i];
        i += 1;
      }
    }

    return result;
  }

  function displayUartOutput(data) {
    const cleanData = stripAnsi(data);
    let val = getBaseText();
    for (let i = 0; i < cleanData.length; i++) {
      const char = cleanData[i];
      if (char === '\x08' || char === '\x7f') {
        val = val.slice(0, -1);
      } else if (char === '\x00') {
        continue;
      } else {
        val += char;
      }
    }
    setTerminalText(val);
    ta.scrollTop = ta.scrollHeight;
  }

  ta.addEventListener('keydown', async (e) => {
    if (!isConnected || !writer) return;

    if (e.ctrlKey && e.key.toLowerCase() === 'c' && window.getSelection().toString() !== '') return;
    if (e.ctrlKey && e.key.toLowerCase() === 'v') return;

    if (e.ctrlKey && !e.altKey && !e.metaKey) {
      const key = e.key.toLowerCase();
      if (key >= 'a' && key <= 'z') {
        e.preventDefault();
        const code = key.charCodeAt(0) - 96;
        await sendRawData(String.fromCharCode(code));
        return;
      }
    }

    const h = loadHistory();

    switch (e.key) {
      case 'Enter':
        e.preventDefault();
        await sendRawData('\r\n');
        if (inputBuffer.trim()) {
          addToHistory(inputBuffer);
        }
        inputBuffer = '';
        historyIndex = -1;
        break;
      case 'Backspace':
        e.preventDefault();
        if (inputBuffer.length > 0) {
          inputBuffer = inputBuffer.slice(0, -1);
          await sendRawData('\x08');
        }
        break;
      case 'Delete':
        e.preventDefault();
        await sendRawData('\x1b[3~');
        break;
      case 'Tab':
        e.preventDefault();
        await sendRawData('\x09');
        break;
      case 'Escape':
        e.preventDefault();
        await sendRawData('\x1b');
        break;
      case 'ArrowUp':
        e.preventDefault();
        if (h.length > 0) {
          if (historyIndex === -1) tempInput = inputBuffer;
          if (historyIndex < h.length - 1) {
            historyIndex++;
            const cmd = h[historyIndex];
            if (inputBuffer.length > 0) await sendRawData('\x08'.repeat(inputBuffer.length));
            inputBuffer = cmd;
            await sendRawData(inputBuffer);
          }
        }
        break;
      case 'ArrowDown':
        e.preventDefault();
        if (h.length > 0) {
          if (historyIndex > 0) {
            historyIndex--;
            const cmd = h[historyIndex];
            if (inputBuffer.length > 0) await sendRawData('\x08'.repeat(inputBuffer.length));
            inputBuffer = cmd;
            await sendRawData(inputBuffer);
          } else if (historyIndex === 0) {
            historyIndex = -1;
            if (inputBuffer.length > 0) await sendRawData('\x08'.repeat(inputBuffer.length));
            inputBuffer = tempInput;
            await sendRawData(inputBuffer);
          }
        }
        break;
      case 'ArrowRight':
        e.preventDefault();
        await sendRawData('\x1b[C');
        break;
      case 'ArrowLeft':
        e.preventDefault();
        await sendRawData('\x1b[D');
        break;
      case 'Home':
        e.preventDefault();
        await sendRawData('\x1b[H');
        break;
      case 'End':
        e.preventDefault();
        await sendRawData('\x1b[F');
        break;
      case 'PageUp':
        e.preventDefault();
        await sendRawData('\x1b[5~');
        break;
      case 'PageDown':
        e.preventDefault();
        await sendRawData('\x1b[6~');
        break;
      default:
        if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
          e.preventDefault();
          inputBuffer += e.key;
          await sendRawData(e.key);
        }
        break;
    }
  });

  ta.addEventListener('paste', async (e) => {
    if (!isConnected || !writer) return;
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (text) {
      inputBuffer += text;
      await sendRawData(text);
    }
  });

  ta.addEventListener('focus', () => {
    isFocused = true;
    if (isConnected) {
      startCursorBlink();
    }
  });

  ta.addEventListener('blur', () => {
    isFocused = false;
    stopCursorBlink();
  });

  document.getElementById('connectButton').addEventListener('click', () => {
    if (isConnected) doDisconnect();
    else connectToSerialPort();
  });

  document.getElementById('saveButton').addEventListener('click', () => {
    const text = getBaseText();
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([text], { type: 'text/plain' })),
      download: 'serial_output.txt'
    });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  document.getElementById('clearButton').addEventListener('click', () => {
    ta.value = '';
    inputBuffer = '';
    historyIndex = -1;
    if (isFocused && isConnected) {
      ta.value = CURSOR_CHAR;
    }
  });

  document.getElementById('clearHistoryBtn').addEventListener('click', () => {
    saveHistory([]);
    renderHistory();
  });

  renderHistory();
});
</script>
</body>
</html>
